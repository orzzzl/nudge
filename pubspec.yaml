name: nudge
description: "A local-first self-discipline app."
publish_to: 'none'
version: 0.1.1+2

environment:
  sdk: ^3.12.0

dependencies:
  drift: ^2.31.0
  flutter:
    sdk: flutter
  flutter_local_notifications: 19.5.0
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.1.0
  flutter_timezone: 5.0.1
  go_router: ^17.2.3
  # Rounded "macaron" typography (Baloo 2 + ZCOOL KuaiLe zh fallback). Fonts
  # fetch + cache at runtime on first use; no .ttf is bundled.
  google_fonts: ^6.2.1
  intl: ^0.20.2
  package_info_plus: ^8.1.0
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.0
  # Pin to the last release that actually ships the native sqlite3 libraries.
  # 0.6.0+eol is an end-of-life stub with NO libsqlite3.so, which crashes the app
  # on-device the first time it touches the database (host-only tests don't catch it).
  sqlite3_flutter_libs: ^0.5.42
  timezone: 0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  # Already pulled in transitively via drift; declared explicitly so the DB
  # migration test can hand-build a v1 database without tripping
  # depend_on_referenced_packages.
  sqlite3: ^2.4.0
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  drift_dev: ^2.31.0
  # Generates the launcher icons (android mipmaps + adaptive + iOS) from the
  # 团团 art rendered by tool/gen_app_icon.dart into assets/icon/.
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true

# Launcher icon = the 团团 mascot. Regenerate after re-running
# `flutter test tool/gen_app_icon.dart` with: `dart run flutter_launcher_icons`.
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFF3E6"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
