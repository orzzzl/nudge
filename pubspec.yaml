name: nudge
description: "A local-first self-discipline app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.1.0
  go_router: ^17.2.3
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

flutter:
  generate: true
  uses-material-design: true
