name: nudge
description: "A local-first self-discipline app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  drift: ^2.31.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.1.0
  go_router: ^17.2.3
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  # Pin to the last release that actually ships the native sqlite3 libraries.
  # 0.6.0+eol is an end-of-life stub with NO libsqlite3.so, which crashes the app
  # on-device the first time it touches the database (host-only tests don't catch it).
  sqlite3_flutter_libs: ^0.5.42

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  drift_dev: ^2.31.0

flutter:
  generate: true
  uses-material-design: true
