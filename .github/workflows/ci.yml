name: CI

# Runs the same checks the agents run locally, on every PR and on main, so green
# status stops depending on someone remembering to run them by hand.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # v5 runs on Node 24 (v4 used the now-deprecated Node 20).
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          # Pinned to match local dev (Dart 3.12). Bump deliberately, not "latest".
          flutter-version: 3.44.0
          channel: stable
          cache: true

      # `flutter pub get` also regenerates the gitignored gen_l10n output (generate: true).
      # Drift *.g.dart is committed, so no build_runner step is needed here.
      - name: Install dependencies
        run: flutter pub get

      - name: Format
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      # AGENTS.md hard rule: no Chinese in hand-written code except inside *.arb
      # (user-facing strings go through i18n; comments/identifiers stay English).
      # rg is preinstalled on the runner and matches \p{Han} natively; it also
      # skips the gitignored generated l10n. rg exits 0 when it finds a match, so
      # a match here means the rule was violated -> fail the build.
      - name: No Chinese outside ARB
        run: |
          if rg -n "\p{Han}" lib test --glob '!*.arb' --glob '!lib/l10n/generated/**'; then
            echo "::error::Chinese (Han) characters found outside *.arb (AGENTS.md hard rule). Move user-facing strings to ARB; keep comments and identifiers in English."
            exit 1
          fi

      - name: Test
        run: flutter test
