name: On-device DB Smoke

on:
  pull_request:
    # This intentionally avoids gating unrelated PRs; the fast CI workflow still
    # runs on every PR.
    paths:
      - 'lib/data/**'
      - 'integration_test/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'android/**'
      - 'ios/**'
      - '.github/workflows/db-smoke.yml'
  push:
    branches: [main]

jobs:
  android-db-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # v5 runs on Node 24 (v4 used the now-deprecated Node 20).
      - uses: actions/checkout@v5

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run DB smoke test on Android
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: flutter test integration_test/db_smoke_test.dart

  android-notify-smoke:
    # Verifies the WHOLE native notification chain (channel + AlarmManager +
    # the alarm firing + the notification posting) — the gap that let the
    # silent-notification incidents reach users. Host tests only prove we call
    # the plugin correctly; this proves it actually fires.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run notification smoke test on Android
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # API 30 (Android 11) grants POST_NOTIFICATIONS by default — no
          # runtime permission dialog to tap inside the headless test. The
          # Android-13 deny path is covered by the host scheduler test instead.
          api-level: 30
          arch: x86_64
          target: google_apis
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -no-boot-anim -camera-back none
          disable-animations: true
          script: flutter test integration_test/notify_smoke_test.dart

  ios-db-smoke:
    # iOS links sqlite3 through a completely different native path than Android
    # (Swift Package Manager / CocoaPods, not Gradle), so a dep bump can break one
    # platform while the other stays green — verify both. Needs a macOS runner for
    # the iOS Simulator.
    runs-on: macos-latest
    # KNOWN-FLAKY → non-blocking. On GitHub's macOS runners `flutter test -d
    # <sim>` reliably hangs after "Xcode build done" at "Waiting for VM Service
    # port to be available...": Flutter discovers the Dart VM service over mDNS
    # (Info.plist NSBonjourServices=_dartVmService._tcp), which needs the Local
    # Network privacy grant. A fresh CI simulator denies it and there's no
    # `simctl privacy` service to pre-grant it, so discovery never completes. It
    # passes locally (permission already granted). Until VM-service discovery is
    # fixed this job is best-effort signal, NOT a merge gate. `continue-on-error`
    # keeps a job *failure* from blocking main — note it does NOT cover a
    # `timeout-minutes` *cancellation*, which is why the test step runs under its
    # own watchdog (below) that turns a hang into a normal failure, not a cancel.
    # The Android db/notify smoke jobs remain the hard DB gate.
    continue-on-error: true
    # Ultimate backstop only; the in-step watchdog fires first (~12min). This must
    # stay above the watchdog so a hang fails (neutralized) rather than cancels.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Boot iOS simulator
        run: |
          # Model names vary by the runner's Xcode version, so resolve the UDID of
          # the first available iPhone simulator dynamically.
          UDID=$(xcrun simctl list devices available | grep -m1 'iPhone' \
            | grep -oE '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}')
          echo "Booting simulator $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Run DB smoke test on iOS
        # macOS runners ship no `timeout`, so watchdog the run by hand: kill it
        # after 12min and exit with its real status. A kill -> non-zero exit is a
        # step *failure* (neutralized by job-level continue-on-error -> green run),
        # NOT a `timeout-minutes` cancellation (which would mark the run cancelled
        # and is NOT covered by continue-on-error). A genuine future iOS failure
        # still surfaces as a (non-blocking) red X. --verbose keeps the mDNS
        # VM-service-discovery hang diagnosable in the log.
        run: |
          set +e
          flutter test integration_test/db_smoke_test.dart -d "$SIM_UDID" --verbose &
          TEST_PID=$!
          ( sleep 720
            echo "::warning::iOS DB smoke watchdog: flutter test still running after 12min (known mDNS VM-service hang) — killing."
            kill -TERM "$TEST_PID" 2>/dev/null
            sleep 5
            kill -KILL "$TEST_PID" 2>/dev/null ) &
          WATCHDOG_PID=$!
          wait "$TEST_PID"
          STATUS=$?
          kill -TERM "$WATCHDOG_PID" 2>/dev/null
          echo "iOS DB smoke exited with status $STATUS"
          exit "$STATUS"
