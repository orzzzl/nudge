name: On-device DB Smoke

on:
  pull_request:
    # This intentionally avoids gating unrelated PRs; the fast CI workflow still
    # runs on every PR.
    paths:
      - 'lib/data/**'
      - 'integration_test/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'android/**'
      - 'ios/**'
      - '.github/workflows/db-smoke.yml'
  push:
    branches: [main]

jobs:
  android-db-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # v5 runs on Node 24 (v4 used the now-deprecated Node 20).
      - uses: actions/checkout@v5

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run DB smoke test on Android
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: flutter test integration_test/db_smoke_test.dart

  android-notify-smoke:
    # Verifies the WHOLE native notification chain (channel + AlarmManager +
    # the alarm firing + the notification posting) — the gap that let the
    # silent-notification incidents reach users. Host tests only prove we call
    # the plugin correctly; this proves it actually fires.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run notification smoke test on Android
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # API 30 (Android 11) grants POST_NOTIFICATIONS by default — no
          # runtime permission dialog to tap inside the headless test. The
          # Android-13 deny path is covered by the host scheduler test instead.
          api-level: 30
          arch: x86_64
          target: google_apis
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -no-boot-anim -camera-back none
          disable-animations: true
          script: flutter test integration_test/notify_smoke_test.dart

  ios-db-smoke:
    # iOS links sqlite3 through a completely different native path than Android
    # (Swift Package Manager, not Gradle), so a dep bump can break one platform
    # while the other stays green — verify both. Needs a macOS runner.
    #
    # Driven by `xcodebuild test` against a native XCTest target: RunnerTests.m
    # uses integration_test's INTEGRATION_TEST_IOS_RUNNER macro, so XCTest hosts
    # the app in-process and surfaces the Dart integration test as XCTest cases.
    # That path does NOT use the Flutter tool's mDNS VM-service discovery, which
    # is what made `flutter test -d <sim>` hang for ~30min at "Waiting for VM
    # Service port..." on CI simulators (no Local Network grant). So this is a
    # real blocking gate again, not best-effort.
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Point the iOS build's FLUTTER_TARGET at the integration test and
      # regenerate the SPM package; xcodebuild's build phase assembles the Dart
      # bundle. --simulator => debug + simulator sdk.
      - name: Configure iOS build for the integration test
        run: flutter build ios --config-only integration_test/db_smoke_test.dart --simulator

      - name: Run DB smoke test on iOS (xcodebuild)
        working-directory: ios
        run: |
          set -o pipefail
          UDID=$(xcrun simctl list devices available | grep -m1 'iPhone' \
            | grep -oE '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}')
          echo "Using simulator $UDID"
          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID" -b
          RESULT="$RUNNER_TEMP/ios_test.xcresult"
          rm -rf "$RESULT"
          # Single attempt: the 3x retry loop blew past the job timeout before it
          # could even dump diagnostics. xcodebuild test can't hang on mDNS, so a
          # single run is enough. XCTest prints only a one-line summary to stdout;
          # the integration_test assertion/exception lives in the .xcresult, so
          # dump it on failure to expose the real cause.
          set +e
          xcodebuild test \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$UDID" \
            -only-testing:RunnerTests \
            -resultBundlePath "$RESULT"
          STATUS=$?
          if [ "$STATUS" -ne 0 ] && [ -d "$RESULT" ]; then
            echo "----- .xcresult test failures -----"
            xcrun xcresulttool get test-results summary --path "$RESULT" --format json 2>/dev/null \
              | python3 -c "import sys,json;d=json.load(sys.stdin);[print('FAILURE:',f.get('failureText')) for f in d.get('testFailures',[])]" 2>/dev/null || true
            echo "-----------------------------------"
          fi
          exit "$STATUS"
