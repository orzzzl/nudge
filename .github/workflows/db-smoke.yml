name: On-device DB Smoke

on:
  pull_request:
    # This intentionally avoids gating unrelated PRs; the fast CI workflow still
    # runs on every PR.
    paths:
      - 'lib/data/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'android/**'
      - 'ios/**'
      - '.github/workflows/db-smoke.yml'
  push:
    branches: [main]

jobs:
  android-db-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # v5 runs on Node 24 (v4 used the now-deprecated Node 20).
      - uses: actions/checkout@v5

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run DB smoke test on Android
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: flutter test integration_test/db_smoke_test.dart

  ios-db-smoke:
    # iOS links sqlite3 through a completely different native path than Android
    # (Swift Package Manager / CocoaPods, not Gradle), so a dep bump can break one
    # platform while the other stays green — verify both. Needs a macOS runner for
    # the iOS Simulator.
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Boot iOS simulator
        run: |
          # Model names vary by the runner's Xcode version, so resolve the UDID of
          # the first available iPhone simulator dynamically.
          UDID=$(xcrun simctl list devices available | grep -m1 'iPhone' \
            | grep -oE '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}')
          echo "Booting simulator $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Run DB smoke test on iOS
        run: flutter test integration_test/db_smoke_test.dart -d "$SIM_UDID"
